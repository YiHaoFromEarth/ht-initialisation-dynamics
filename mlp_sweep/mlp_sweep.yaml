experiment_metadata:
  name: "MLP_SEED_SWEEP"
  output_root: "./mlp_sweep"
  comment: >
    Conducting a comprehensive sweep over the heavy-tailed parameters alpha and g for a 5-layer MLP trained on MNIST.
    The supervisor said to look into running a sweep to look for patterns and signs of universality.
    Doing a grid with half the resolution of Kevin's manuscript for now, will expand later if needed.
    Sweep is 5 seeds over alpha = [0.5, 1.0, 1.5, 2.0, 2.5, 3.0] and g = [1.0, 1.2, 1.4, 1.6, 1.8, 2.0].

    Addition:
    Expanded the resolution of the sweep efficiently by using a quincunx sampling pattern, targeting areas of max uncertainity.
    Expanded sweep is 5 seeds over alpha = [0.75, 1.25, 1.75, 2.25, 2.75] and g = [1.1, 1.3, 1.5, 1.7, 1.9].

model:
  class_name: "GeneralMLP"
  params:
    kwargs:
      input_size: 784
      hidden_size: 784
      num_classes: 10
      depth: 4
      activation_name: "tanh"
      bias: False

optimizer:
  class_name: "SGD"
  params:
    lr: 0.001
    momentum: 0.0
    weight_decay: 0.0

data:
  dataset_name: "MNIST"
  batch_size: 128
  use_gpu: true
  fast_load: true
  transforms:
    - ToTensor: null
    - Normalize:
        mean: [0.1307]
        std: [0.3081]

heavy_tail:
  enabled: true
  alpha: [0.75, 1.25, 1.75, 2.25, 2.75]
  g: [1.1, 1.3, 1.5, 1.7, 1.9]

hyperparams:
  epochs: 150
  seed: 0
  log_freq: 10
  device: "cuda"
  save_weights_history: true
