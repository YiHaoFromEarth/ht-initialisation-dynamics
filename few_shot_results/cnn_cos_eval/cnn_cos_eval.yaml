experiment_metadata:
  name: "CNN_COSINE_EVAL"
  output_root: "./few_shot_results/cnn_cos_eval"
  comment: >
    Comparing original euclidean few-shot evaluation to cosine distance.
    Achieved by normalising the support and query vectors.
    Removed the tanh activation after the final layer for few-shot eval so we have unbounded vectors from the backbone.

model:
  class_name: "ResearchCNN"
  params:
    kwargs:
      input_channels: 1
      base_channels: 32
      num_classes: 964
      depth: 3
      activation_name: "tanh"
      dropout_p: 0.5
      bias: False

optimizer:
  class_name: "SGD"
  params:
    lr: 0.01
    momentum: 0.0
    weight_decay: 0.0

data:
  dataset_name: "Omniglot"
  batch_size: 128
  use_gpu: true
  fast_load: true
  transforms:
    - Resize:
        size: [28, 28]
    - Grayscale:
        num_output_channels: 1
    - ToTensor: null
    - Normalize:
        mean: [0.5]
        std: [0.5]

heavy_tail:
  enabled: true
  alpha: 1.2
  g: 0.5

hyperparams:
  epochs: 150
  seed: 0
  log_freq: 10
  device: "cuda"
  hook_layers: "features.6"
