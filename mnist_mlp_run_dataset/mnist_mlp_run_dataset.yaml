experiment_metadata:
  name: "Standard Runs on MNIST with MLP"
  output_root: "./mnist_mlp_run_dataset"
  comment: >
    Basic Sweep over 9 pairs of alpha and g for MNIST, replicating Qu et al. 2022 runs.
    A basic dataset to analyse extended criticality with various methods.

model:
  class_name: "GeneralMLP"
  params:
    kwargs:
      input_size: 784
      hidden_size: 784
      num_classes: 10
      depth: 9
      activation_name: "tanh"
      bias: False

optimizer:
  class_name: "SGD"
  params:
    lr: 0.001
    momentum: 0.0
    weight_decay: 0.0

data:
  dataset_name: "MNIST"
  batch_size: 1024
  use_gpu: true
  fast_load: true
  transforms:
    - ToTensor: null
    - Normalize:
        mean: [0.1307]
        std: [0.3081]

heavy_tail:
  enabled: true
  alpha: [1.2, 1.5, 2.0]
  g: [0.5, 1.0, 3.0]

hyperparams:
  epochs: 150
  seed: 0
  log_freq: 10
  device: "cuda"
  save_weights_history: true
