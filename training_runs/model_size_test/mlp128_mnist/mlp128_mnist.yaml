experiment_metadata:
  name: "MLP_MNIST_ANALYSIS"
  output_root: "./training_runs/mlp128_mnist"
  comment: >
    Trying to trigger a rich learning regime by shrinking the hidden layer width to 128.
    MLP784 training run displayed lazy learning with no significant shift in eigenvalue distribution.
    Theory is that MLP784 on MNIST is too easy, trying to make the problem harder.

model:
  class_name: "GeneralMLP"
  params:
    kwargs:
      input_size: 784
      hidden_size: 128
      num_classes: 10
      depth: 2
      activation_name: "tanh"
      bias: False

optimizer:
  class_name: "SGD"
  params:
    lr: 0.001
    momentum: 0.0
    weight_decay: 0.0

data:
  dataset_name: "MNIST"
  batch_size: 128
  use_gpu: true
  fast_load: true
  transforms:
    - ToTensor: null
    - Normalize:
        mean: [0.1307]
        std: [0.3081]

heavy_tail:
  enabled: true
  alpha: 1.2
  g: 1.0

hyperparams:
  epochs: 150
  seed: 0
  log_freq: 10
  device: "cuda"
  save_weights_history: true
