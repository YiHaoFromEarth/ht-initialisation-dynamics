experiment_metadata:
  name: "CNN_HT_WINNER_RUN"
  output_root: "./few_shot_results/cnn"
  comment: >
    Removed last MaxPool layer that was crushing the heavy-tailed activations
    Added a dropout layer to compensate and prevent memorisation
    Lowered learning rate and g to add stability

model:
  class_name: "ResearchCNN"
  params:
    kwargs:
      input_channels: 1
      base_channels: 32
      num_classes: 964
      depth: 3
      activation_name: "tanh"
      dropout_p: 0.5
      bias: False

optimizer:
  class_name: "SGD"
  params:
    lr: 0.01
    momentum: 0.0
    weight_decay: 0.0

data:
  dataset_name: "Omniglot"
  batch_size: 128
  use_gpu: true
  fast_load: true
  transforms:
    - Resize:
        size: [28, 28]
    - Grayscale:
        num_output_channels: 1
    - ToTensor: null
    - Normalize:
        mean: [0.5]
        std: [0.5]

heavy_tail:
  enabled: true
  alpha: 1.2
  g: 0.5

hyperparams:
  epochs: 150
  seed: 0
  log_freq: 10
  device: "cuda"
